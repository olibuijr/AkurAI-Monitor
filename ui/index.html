<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AkurAI Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg?v=9">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=9">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=9">
  <meta name="theme-color" content="#0a0c11">
  <!-- App styles first, then theme token overrides -->
  <link rel="stylesheet" href="/style.css?v=9">
  <!-- Named multi-theme tokens (:root[data-theme]); must come after style.css
       so the active theme's values win. -->
  <link rel="stylesheet" href="/themes.css?v=9">
  <!-- Flash-guard: set the active theme before first paint to avoid a FOUC. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("akurai-theme");
        if (!t) t = matchMedia("(prefers-color-scheme: light)").matches ? "akurai-light" : "akurai";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <script type="module" src="/theme.js?v=9"></script>
</head>
<body>
  <header>
    <a class="brand" href="#/">
      <img class="brand-logo" src="/logo.svg?v=9" alt="">
      <span>Akur<b>AI</b> Monitor</span>
    </a>
    <nav>
      <a href="#/" class="active" data-page="dashboard">Dashboard</a>
      <a href="#/logs" data-page="logs">Logs</a>
      <a href="#/alerts" data-page="alerts">Alerts</a>
      <span class="theme-picker" data-theme-picker></span>
    </nav>
  </header>
  <main id="app"></main>
  <script src="/app.js?v=9"></script>
</body>
</html>
